# Chipathon 2026 workshop padring slot.
#
# Mirrors https://github.com/JuanMoya/padring_gf180 (Workshop_CASS/padring/workshop_padring.cfg).
# That config targets the stand-alone `padring` tool; this YAML is the
# LibreLane-native equivalent, usable with the wafer-space
# `gf180mcu-project-template`.
#
# Die:    2935 x 2935 um (same as JuanMoya).
# Pads:   60 analog (gf180mcu_fd_io__asig_5p0)
#       + 20 bidir   (gf180mcu_fd_io__bi_24t; JuanMoya uses bi_t)
#       + 4  dvdd    (gf180mcu_ws_io__dvdd;  JuanMoya uses gf180mcu_fd_io__dvdd)
#       + 4  dvss    (gf180mcu_ws_io__dvss;  JuanMoya uses gf180mcu_fd_io__dvss)
#       + 2  hardcoded input cells (clk_pad = gf180mcu_fd_io__in_s,
#                                  rst_n_pad = gf180mcu_fd_io__in_c)
#       + 4  corners (gf180mcu_fd_io__cor, generated automatically).
#
# Index mapping (generate loops in chip_top.sv):
#   analog[i].pad        = ana<i+1>     (so analog[0] = ana1, analog[59] = ana60)
#   bidir[i].pad         = config<i+1>  (bidir[0] = config1, bidir[19] = config20)
#   dvdd_pads[0..3].pad  = vdd_ana1 (N), vdd_dig1 (E), vdd_ana2 (S), vdd_dig4 (W)
#   dvss_pads[0..3].pad  = vss_ana1 (N), vss_dig2 (E), vss_ana2 (S), vss_dig3 (W)

# Floorplanning
FP_SIZING: absolute
# Keep ~442 um of padring/sealring ring around the core, matching the
# other slots.  Core area is 2051 x 2051 um.
DIE_AREA:  [0, 0, 2935, 2935]
CORE_AREA: [442, 442, 2493, 2493]

VERILOG_DEFINES: ["SLOT_WORKSHOP"]

# Pad lists read clockwise from the south-west corner.
# clk_pad and rst_n_pad are stock single-instance inputs in
# chip_top.sv and sit at the start of the south edge (nearest SW),
# as in slot_1x1.

# ----- South: SW -> SE (24 pads) -----
PAD_SOUTH: [
    clk_pad,
    rst_n_pad,
    "inputs\\[0\\].pad",

    "analog\\[28\\].pad",
    "analog\\[29\\].pad",
    "analog\\[30\\].pad",
    "analog\\[31\\].pad",
    "analog\\[32\\].pad",
    "analog\\[33\\].pad",
    "analog\\[34\\].pad",
    "analog\\[35\\].pad",
    "analog\\[36\\].pad",
    "analog\\[37\\].pad",

    "dvdd_pads\\[2\\].pad",
    "dvss_pads\\[2\\].pad",

    "analog\\[38\\].pad",
    "analog\\[39\\].pad",
    "analog\\[40\\].pad",
    "analog\\[41\\].pad",
    "analog\\[42\\].pad",
    "analog\\[43\\].pad",
    "analog\\[44\\].pad",
    "analog\\[45\\].pad",
    "analog\\[46\\].pad",
    "analog\\[47\\].pad",
]

